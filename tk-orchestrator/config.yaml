poll_interval_seconds: 60
output_dir: ./output
videos_per_poll: 1
max_videos_per_channel: 10
max_videos_total: 200
comment_count: 10
stt_model: mlx-community/whisper-large-v3-asr-4bit
aligner_model: mlx-community/Qwen3-ForcedAligner-0.6B-8bit
translate_model: mlx-community/Qwen3-4B-Instruct-2507-4bit
translate_batch_size: 10
db_path: ./tk_orchestrator.db
# Dev-only channels to seed on `tk-orch start` when missing from the DB.
default_channels:
  - https://www.tiktok.com/@frances.con.romeo
  - https://www.tiktok.com/@paulmirabel_